experiment:
  name: refusal_baseline
  behavior: refusal
  model_config: configs\model_gpt2_small.yaml
  dataset:
    path: data\pairs\refusal_pairs_2.jsonl
  probes:
    method: logistic_regression
    max_iter: 1000
    cv_folds: 5
  causal:
    method: activation_patching
    metric: logit_diff
    n_samples: 50
  output_dir: experiments\results\refusal\1
