# .github/workflows/tests.yml
# Runs the pytest suite on every push and pull request

name: Tests

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  test:
    name: pytest (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Upgrade Pip
        run: pip install --upgrade pip setuptools wheel

      - name: Install dependencies
        run: pip install -e ".[dev]" --no-build-isolation

      - name: Lint with ruff
        run: ruff check src/ experiments/ tests/

      - name: Run tests
        run: pytest tests/ -v --cov=src --cov-report=term-missing --cov-report=xml

      - name: Upload coverage report
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage.xml
          fail_ci_if_error: false   # don't break CI if Codecov is down
